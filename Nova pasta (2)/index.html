<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Tributária Gocase - 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; border: 2px solid #000; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- LINK DA PLANILHA ATUALIZADO ---
        const ORIGINAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRykG4Z4pN-ICEym8uYRPnvOJ18clvmM8eP5t2l10RBfrPGmad3TagyAF8qczDGBw/pub?output=csv";
        
        // Proxy robusto para evitar erros de CORS na TV ou Navegador
        const SHEET_CSV_URL = `https://corsproxy.io/?${encodeURIComponent(ORIGINAL_URL)}`;

        function App() {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [taxes, setTaxes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);

            const fetchSheetData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(SHEET_CSV_URL);
                    if (!response.ok) throw new Error('Erro na conexão');
                    
                    const csvText = await response.text();
                    const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== "");
                    
                    if (rows.length < 2) throw new Error('Sem dados');

                    const dataRows = rows.slice(1);

                    const parsedData = dataRows.map((line, index) => {
                        // Divide por vírgula, ignorando vírgulas dentro de aspas
                        const cols = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
                        const cleanCols = cols.map(c => c.replace(/^"|"$/g, '').trim());

                        return {
                            id: index,
                            name: cleanCols[0] || 'Obrigação',
                            state: cleanCols[1] || '-',
                            dueDate: cleanCols[2] || '---',
                            status: (cleanCols[3] || 'pendente').toLowerCase().trim(),
                            responsible: cleanCols[4] || 'Equipe',
                            competence: cleanCols[5] || '---'
                        };
                    });
                    
                    setTaxes(parsedData);
                    setErrorMsg(null);
                } catch (err) {
                    console.error("Falha ao sincronizar:", err);
                    setErrorMsg("Falha de Sincronismo");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchSheetData();
                const dataTimer = setInterval(fetchSheetData, 300000); 
                const clockTimer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => { clearInterval(dataTimer); clearInterval(clockTimer); };
            }, []);

            const getStatus = (tax) => {
                const today = new Date();
                today.setHours(0,0,0,0);
                
                let dateStr = tax.dueDate;
                if(dateStr.includes('/')) {
                    const parts = dateStr.split('/');
                    if (parts.length === 3) dateStr = `${parts[2]}-${parts[1]}-${parts[0]}`;
                }

                const due = new Date(dateStr + 'T00:00:00');
                
                if (tax.status.includes('pago') || tax.status.includes('conclu')) return 'pago';
                if (isNaN(due.getTime())) return 'pendente';
                if (due < today) return 'atrasado';
                if (due.getTime() === today.getTime()) return 'hoje';
                return 'pendente';
            };

            const processedTaxes = taxes.map(t => ({ ...t, currentStatus: getStatus(t) }));
            const stats = {
                total: processedTaxes.length,
                pago: processedTaxes.filter(t => t.currentStatus === 'pago').length,
                atrasado: processedTaxes.filter(t => t.currentStatus === 'atrasado').length,
                hoje: processedTaxes.filter(t => t.currentStatus === 'hoje').length,
            };
            const progress = stats.total > 0 ? Math.round((stats.pago / stats.total) * 100) : 0;

            return (
                <div className="h-screen flex flex-col p-6 lg:p-10 bg-[#050505]">
                    {/* Cabeçalho Premium Gocase */}
                    <header className="flex justify-between items-center mb-10 bg-zinc-900/40 p-8 rounded-[2.5rem] border border-zinc-800 relative overflow-hidden shadow-2xl">
                        <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-[#FF4DAD] via-[#A855F7] to-[#00D4FF]"></div>
                        <div className="flex items-center gap-8">
                            <div className="w-24 h-24 bg-gradient-to-br from-[#FF4DAD] to-[#A855F7] rounded-[2rem] flex items-center justify-center shadow-2xl shadow-pink-500/20">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M12 2v20M2 12h20M12 2l10 10-10 10L2 12z"/></svg>
                            </div>
                            <div>
                                <h1 className="text-6xl font-black text-white uppercase tracking-tighter italic leading-none">GOCASE <span className="text-[#FF4DAD]">TAX</span></h1>
                                <p className="text-zinc-500 text-2xl font-bold tracking-[0.2em] uppercase mt-2">Fiscal Compliance 2026</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="text-8xl font-mono font-black text-white tracking-tighter leading-none italic">
                                {currentTime.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}
                            </div>
                            <div className="text-2xl text-zinc-400 font-bold mt-2 uppercase tracking-widest">
                                {currentTime.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' })}
                            </div>
                        </div>
                    </header>

                    {/* Cards de Métricas */}
                    <div className="flex-1 flex flex-col gap-10 overflow-hidden">
                        <div className="grid grid-cols-4 gap-8 shrink-0">
                            <Card title="Eficiência" value={`${progress}%`} color="emerald" progress={progress} />
                            <Card title="Entregues" value={stats.pago} color="emerald" icon="✓" />
                            <Card title="Vence Hoje" value={stats.hoje} color="yellow" icon="!" pulse={stats.hoje > 0} />
                            <Card title="Em Atraso" value={stats.atrasado} color="red" icon="⚠" pulse={stats.atrasado > 0} />
                        </div>

                        {/* Tabela de Obrigações */}
                        <div className="flex-1 bg-zinc-900/20 border border-zinc-800/60 rounded-[3rem] overflow-hidden flex flex-col shadow-2xl backdrop-blur-sm">
                            <div className="px-12 py-8 border-b border-zinc-800/60 flex justify-between items-center bg-zinc-900/40">
                                <h2 className="text-3xl font-black text-white uppercase tracking-widest flex items-center gap-4 italic">
                                    <span className="w-3 h-10 bg-[#FF4DAD] rounded-full"></span> 
                                    Cronograma de Obrigações
                                </h2>
                                {loading ? (
                                    <div className="text-[#00D4FF] animate-pulse font-black text-2xl uppercase italic tracking-tighter">Sincronizando Dados...</div>
                                ) : errorMsg ? (
                                    <div className="text-red-500 font-black text-2xl uppercase italic animate-pulse">{errorMsg}</div>
                                ) : (
                                    <div className="text-zinc-500 font-bold text-xl uppercase bg-zinc-800/50 px-6 py-2 rounded-full">Atualizado: {currentTime.toLocaleTimeString()}</div>
                                )}
                            </div>

                            <div className="grid grid-cols-12 gap-6 px-12 py-6 bg-zinc-800/20 text-zinc-500 text-xl font-black uppercase tracking-widest border-b border-zinc-800/60">
                                <div className="col-span-5">Obrigação Tributária</div>
                                <div className="col-span-1 text-center">UF</div>
                                <div className="col-span-2 text-center">Vencimento</div>
                                <div className="col-span-2 text-center">Status</div>
                                <div className="col-span-2 text-right">Responsável</div>
                            </div>

                            <div className="flex-1 overflow-y-auto px-8 py-6 custom-scrollbar">
                                <div className="flex flex-col gap-5">
                                    {processedTaxes.length > 0 ? (
                                        processedTaxes.sort((a,b) => {
                                            const order = { 'hoje': 0, 'atrasado': 1, 'pendente': 2, 'pago': 3 };
                                            return order[a.currentStatus] - order[b.currentStatus];
                                        }).map((tax) => (
                                            <div key={tax.id} className="grid grid-cols-12 gap-6 px-10 py-10 bg-zinc-900/30 hover:bg-zinc-800/40 rounded-[2.5rem] border border-zinc-800/40 items-center transition-all group hover:scale-[1.01]">
                                                <div className="col-span-5">
                                                    <p className="text-4xl font-bold text-white group-hover:text-[#FF4DAD] transition-colors uppercase tracking-tight">{tax.name}</p>
                                                    <p className="text-zinc-500 text-2xl font-bold mt-2 tracking-wider">COMPETÊNCIA: {tax.competence}</p>
                                                </div>
                                                <div className="col-span-1 text-center">
                                                    <span className="px-6 py-2 bg-zinc-800 text-zinc-300 rounded-xl text-2xl font-black italic">{tax.state}</span>
                                                </div>
                                                <div className="col-span-2 text-center text-4xl font-mono font-black text-zinc-200">
                                                    {tax.dueDate}
                                                </div>
                                                <div className="col-span-2 flex justify-center">
                                                    <Badge status={tax.currentStatus} />
                                                </div>
                                                <div className="col-span-2 text-right text-3xl font-black text-zinc-400 italic underline underline-offset-8 decoration-[#A855F7] decoration-4">{tax.responsible}</div>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="flex flex-col items-center justify-center py-32">
                                            {!loading && <div className="text-zinc-700 text-5xl font-black uppercase italic animate-pulse tracking-tighter">Aguardando dados da Gocase Cloud...</div>}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Card({ title, value, color, icon, progress, pulse }) {
            const colors = {
                emerald: 'text-emerald-400 border-emerald-500/20 bg-emerald-500/5 shadow-emerald-500/10',
                yellow: 'text-yellow-400 border-yellow-500/20 bg-yellow-500/5 shadow-yellow-500/10',
                red: 'text-red-500 border-red-500/20 bg-red-500/5 shadow-red-500/10'
            };
            return (
                <div className={`p-8 rounded-[3rem] border ${colors[color]} flex flex-col justify-between h-56 relative overflow-hidden shadow-2xl ${pulse ? 'animate-pulse-soft ring-4 ring-current ring-offset-8 ring-offset-black' : ''}`}>
                    <div className="flex justify-between items-start">
                        <span className="text-2xl font-black uppercase opacity-60 tracking-tighter italic">{title}</span>
                        {icon && <span className="text-6xl font-black opacity-80">{icon}</span>}
                    </div>
                    <div className="text-[5rem] font-black tracking-tighter leading-none italic">{value}</div>
                    {progress !== undefined && (
                        <div className="absolute bottom-0 left-0 h-3 bg-emerald-500 transition-all duration-1000 shadow-[0_0_25px_#10b981]" style={{width: `${progress}%`}}></div>
                    )}
                </div>
            );
        }

        function Badge({ status }) {
            const styles = {
                pago: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30 shadow-emerald-500/20',
                hoje: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30 animate-pulse ring-4 ring-yellow-500/30',
                atrasado: 'bg-red-500/20 text-red-400 border-red-500/30 animate-bounce ring-4 ring-red-500/30',
                pendente: 'bg-blue-500/20 text-blue-400 border-blue-500/30 shadow-blue-500/10'
            };
            const labels = { pago: 'CONCLUÍDO', hoje: 'VENCE HOJE', atrasado: 'EM ATRASO', pendente: 'PENDENTE' };
            return (
                <span className={`px-10 py-4 rounded-[1.5rem] font-black text-2xl border tracking-widest shadow-xl ${styles[status]}`}>
                    {labels[status]}
                </span>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
